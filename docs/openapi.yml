openapi: 3.0.3
info:
  title: SPORT.tech API
  version: 0.1.0

tags:
  - name: auth
    description: Авторизация
  - name: profile
    description: Профиль пользователя
  - name: post
    description: Посты
  - name: donation
    description: Пожертвования
  - name: sport
    description: Виды спорта

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sid

  responses:
    BadRequest:
      description: Запрос не удалось обработать из-за некорректного формата.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            bad_request:
              value:
                error:
                  code: bad_request
                  message: Некорректный запрос
    ValidationError:
      description: Запрос обработан, но входные данные не прошли валидацию.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            validation_error:
              value:
                error:
                  code: validation_error
                  message: Некорректные данные
                  fields:
                    - field: username
                      message: Username должен содержать от 3 до 30 символов и только буквы, цифры или _
                    - field: email
                      message: Неверный формат email
                    - field: password
                      message: Пароль должен содержать минимум 8 символов
                    - field: password_repeat
                      message: Пароли не совпадают

  schemas:
    ValidationErrorField:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            fields:
              type: array
              nullable: true
              items:
                $ref: "#/components/schemas/ValidationErrorField"

    User:
      type: object
      required: [user_id, username, email, created_at, updated_at, is_trainer, is_admin, first_name, last_name]
      properties:
        user_id:
          type: integer
          format: int64
          example: 123
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: '^[A-Za-z0-9_]{3,30}$'
        email:
          type: string
          format: email
          maxLength: 254
          pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
          example: user@example.com
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_trainer:
          type: boolean
          description: true, если у пользователя есть trainer_details
          example: false
        is_admin:
          type: boolean
          description: true, если у пользователя есть admin_profile
          example: false
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        bio:
          type: string
          nullable: true
          maxLength: 1000
        avatar_url:
          type: string
          nullable: true

    TrainerRegisterSport:
      type: object
      required: [sport_type_id, experience_years]
      properties:
        sport_type_id:
          type: integer
          format: int64
        experience_years:
          type: integer
          minimum: 0
        sports_rank:
          type: string
          nullable: true
          maxLength: 100

    TrainerRegisterDetails:
      type: object
      required: [career_since_date, sports]
      properties:
        education_degree:
          type: string
          nullable: true
          maxLength: 255
        career_since_date:
          type: string
          format: date
        sports:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/TrainerRegisterSport"

    ClientRegisterRequest:
      type: object
      required: [username, email, password, password_repeat, first_name, last_name]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: '^[A-Za-z0-9_]{3,30}$'
        email:
          type: string
          format: email
          maxLength: 254
          pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
        password:
          type: string
          minLength: 8
        password_repeat:
          type: string
          minLength: 8
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
      example:
        username: john_doe
        email: user@example.com
        password: supersecret123
        password_repeat: supersecret123
        first_name: John
        last_name: Doe

    TrainerRegisterRequest:
      type: object
      required: [username, email, password, password_repeat, first_name, last_name, trainer_details]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: '^[A-Za-z0-9_]{3,30}$'
        email:
          type: string
          format: email
          maxLength: 254
          pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
        password:
          type: string
          minLength: 8
        password_repeat:
          type: string
          minLength: 8
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        trainer_details:
          $ref: "#/components/schemas/TrainerRegisterDetails"
      example:
        username: ricardo
        email: ricardo@example.com
        password: supersecret123
        password_repeat: supersecret123
        first_name: Ricardo
        last_name: Milos
        trainer_details:
          education_degree: Bachelor of Sports Science
          career_since_date: "2020-01-01"
          sports:
            - sport_type_id: 1
              experience_years: 5
              sports_rank: КМС

    SportType:
      type: object
      required: [sport_type_id, name]
      properties:
        sport_type_id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
          maxLength: 100

    SportTypesResponse:
      type: object
      required: [sport_types]
      properties:
        sport_types:
          type: array
          items:
            $ref: "#/components/schemas/SportType"

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
          pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
        password:
          type: string
          minLength: 1

    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    ProfileResponse:
      type: object
      required: [user_id, is_me, is_trainer, username, first_name, last_name]
      properties:
        user_id:
          type: integer
          format: int64
        is_me:
          type: boolean
          description: true, если профиль принадлежит текущему авторизованному пользователю
        is_trainer:
          type: boolean
          description: true, если у пользователя есть trainer_details
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: '^[A-Za-z0-9_]{3,30}$'
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        bio:
          type: string
          nullable: true
          maxLength: 1000
        avatar_url:
          type: string
          nullable: true
        trainer_details:
          allOf:
            - $ref: "#/components/schemas/TrainerProfileDetails"
          nullable: true

    TrainerProfileSport:
      type: object
      required: [sport_type_id, experience_years]
      properties:
        sport_type_id:
          type: integer
          format: int64
        experience_years:
          type: integer
          minimum: 0
        sports_rank:
          type: string
          nullable: true
          maxLength: 100

    TrainerProfileDetails:
      type: object
      required: [career_since_date, sports]
      properties:
        education_degree:
          type: string
          nullable: true
          maxLength: 255
        career_since_date:
          type: string
          format: date
        sports:
          type: array
          items:
            $ref: "#/components/schemas/TrainerProfileSport"

    UpdateProfileRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: '^[A-Za-z0-9_]{3,30}$'
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        bio:
          type: string
          nullable: true
          maxLength: 1000
      example:
        username: john_doe
        first_name: John
        last_name: Doe
        bio: Тренируюсь пять раз в неделю

    AvatarUploadResponse:
      type: object
      required: [avatar_url]
      properties:
        avatar_url:
          type: string
          example: "https://cdn.example.com/avatars/john_doe.jpg"

    PostListItem:
      type: object
      required: [post_id, trainer_id, title, created_at, min_tier_id, can_view, likes_count, is_liked]
      properties:
        post_id:
          type: integer
          format: int64
        trainer_id:
          type: integer
          format: int64
        min_tier_id:
          type: integer
          format: int64
          nullable: true
          description: Если NULL — пост бесплатный
        title:
          type: string
          minLength: 1
          maxLength: 200
        created_at:
          type: string
          format: date-time
        can_view:
          type: boolean
          description: Есть ли у текущего пользователя доступ к полному посту
        likes_count:
          type: integer
          format: int64
          minimum: 0
        is_liked:
          type: boolean
          description: Лайкнул ли текущий пользователь этот пост

    ProfilePostsResponse:
      type: object
      required: [user_id, posts]
      properties:
        user_id:
          type: integer
          format: int64
        posts:
          type: array
          items:
            $ref: "#/components/schemas/PostListItem"

    PostAttachment:
      type: object
      required: [post_attachment_id, kind, file_url]
      properties:
        post_attachment_id:
          type: integer
          format: int64
        kind:
          type: string
          enum: [image, video, document]
        file_url:
          type: string

    CreatePostAttachmentRequest:
      type: object
      required: [kind, file_url]
      properties:
        kind:
          type: string
          enum: [image, video, document]
        file_url:
          type: string

    CreatePostRequest:
      type: object
      required: [title, text_content]
      properties:
        min_tier_id:
          type: integer
          format: int64
          nullable: true
        title:
          type: string
          minLength: 1
          maxLength: 200
        text_content:
          type: string
          minLength: 1
          maxLength: 10000
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/CreatePostAttachmentRequest"

    UpdatePostRequest:
      type: object
      properties:
        min_tier_id:
          type: integer
          format: int64
          nullable: true
        title:
          type: string
          minLength: 1
          maxLength: 200
        text_content:
          type: string
          minLength: 1
          maxLength: 10000
        attachments:
          type: array
          description: Полная замена списка вложений поста
          items:
            $ref: "#/components/schemas/CreatePostAttachmentRequest"
      example:
        min_tier_id: 3
        title: Обновленный план тренировок на неделю
        text_content: Добавил день восстановления и работу на мобильность.
        attachments:
          - kind: image
            file_url: "https://cdn.example.com/posts/101/updated-cover.jpg"

    PostLikeResponse:
      type: object
      required: [post_id, likes_count, is_liked]
      properties:
        post_id:
          type: integer
          format: int64
        likes_count:
          type: integer
          format: int64
          minimum: 0
        is_liked:
          type: boolean

    PostResponse:
      type: object
      required: [post_id, trainer_id, title, text_content, created_at, updated_at, min_tier_id, attachments, likes_count, is_liked]
      properties:
        post_id:
          type: integer
          format: int64
        trainer_id:
          type: integer
          format: int64
        min_tier_id:
          type: integer
          format: int64
          nullable: true
          description: Если NULL — пост бесплатный
        title:
          type: string
          minLength: 1
          maxLength: 200
        text_content:
          type: string
          minLength: 1
          maxLength: 10000
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        likes_count:
          type: integer
          format: int64
          minimum: 0
        is_liked:
          type: boolean
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/PostAttachment"

    DonationRequest:
      type: object
      required: [amount_value, currency]
      properties:
        amount_value:
          type: integer
          format: int64
          minimum: 1
          description: Сумма пожертвования в минимальных денежных единицах
        currency:
          type: string
          example: RUB
        message:
          type: string
          nullable: true
          maxLength: 500
      example:
        amount_value: 50000
        currency: RUB
        message: Спасибо за полезный контент

    DonationResponse:
      type: object
      required: [donation_id, sender_user_id, recipient_user_id, amount_value, currency, created_at]
      properties:
        donation_id:
          type: integer
          format: int64
        sender_user_id:
          type: integer
          format: int64
        recipient_user_id:
          type: integer
          format: int64
        amount_value:
          type: integer
          format: int64
        currency:
          type: string
        message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time

paths:
  /sport-types:
    get:
      tags: [sport]
      summary: Список видов спорта
      description: Список видов спорта.
      responses:
        "200":
          description: Список видов спорта
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SportTypesResponse"
              examples:
                success:
                  value:
                    sport_types:
                      - sport_type_id: 1
                        name: Бег
                      - sport_type_id: 2
                        name: Плавание
        "400":
          $ref: "#/components/responses/BadRequest"

  /posts:
    post:
      tags: [post]
      summary: Создание поста
      description: Создание поста тренером.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePostRequest"
            examples:
              create_post:
                value:
                  min_tier_id: null
                  title: План тренировок на неделю
                  text_content: Три силовые и две кардио тренировки.
                  attachments:
                    - kind: image
                      file_url: "https://cdn.example.com/posts/101/cover.jpg"
      responses:
        "400":
          $ref: "#/components/responses/BadRequest"
        "201":
          description: Пост создан
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostResponse"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Только тренер может создавать посты
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          $ref: "#/components/responses/ValidationError"

  /posts/{post_id}/likes:
    post:
      tags: [post]
      summary: Поставить лайк посту
      description: Создает или подтверждает лайк текущего пользователя на посте.
      security:
        - cookieAuth: []
      parameters:
        - name: post_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Лайк установлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostLikeResponse"
              examples:
                success:
                  value:
                    post_id: 101
                    likes_count: 25
                    is_liked: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Пост не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [post]
      summary: Убрать лайк с поста
      description: Удаляет лайк текущего пользователя с поста.
      security:
        - cookieAuth: []
      parameters:
        - name: post_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Лайк удален
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostLikeResponse"
              examples:
                success:
                  value:
                    post_id: 101
                    likes_count: 24
                    is_liked: false
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Пост не найден
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register/client:
    post:
      tags: [auth]
      summary: Регистрация клиента
      description: Регистрация клиента.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientRegisterRequest"
            examples:
              client_register:
                value:
                  username: john_doe
                  email: user@example.com
                  password: supersecret123
                  password_repeat: supersecret123
                  first_name: John
                  last_name: Doe
      responses:
        "400":
          $ref: "#/components/responses/BadRequest"
        "201":
          description: Пользователь зарегистрирован
          headers:
            Set-Cookie:
              description: Cookie сессии sid
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
              examples:
                success:
                  value:
                    user:
                      user_id: 123
                      username: john_doe
                      email: user@example.com
                      created_at: "2026-03-06T12:00:00Z"
                      updated_at: "2026-03-06T12:00:00Z"
                      is_trainer: false
                      is_admin: false
                      first_name: John
                      last_name: Doe
                      bio: null
                      avatar_url: null
        "409":
          description: Email или username уже существует
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                email_exists:
                  value:
                    error:
                      code: email_exists
                      message: Email уже существует
                username_exists:
                  value:
                    error:
                      code: username_exists
                      message: Username уже существует
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/register/trainer:
    post:
      tags: [auth]
      summary: Регистрация тренера
      description: Регистрация тренера.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrainerRegisterRequest"
            examples:
              trainer_register:
                value:
                  username: ricardo
                  email: ricardo@example.com
                  password: supersecret123
                  password_repeat: supersecret123
                  first_name: Ricardo
                  last_name: Milos
                  trainer_details:
                    education_degree: Bachelor of Sports Science
                    career_since_date: "2020-01-01"
                    sports:
                      - sport_type_id: 1
                        experience_years: 5
                        sports_rank: КМС
      responses:
        "400":
          $ref: "#/components/responses/BadRequest"
        "201":
          description: Пользователь зарегистрирован
          headers:
            Set-Cookie:
              description: Cookie сессии sid
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
              examples:
                success:
                  value:
                    user:
                      user_id: 123
                      username: ricardo
                      email: ricardo@example.com
                      created_at: "2026-03-06T12:00:00Z"
                      updated_at: "2026-03-06T12:00:00Z"
                      is_trainer: true
                      is_admin: false
                      first_name: Ricardo
                      last_name: Milos
                      bio: null
                      avatar_url: null
        "409":
          description: Email или username уже существует
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                email_exists:
                  value:
                    error:
                      code: email_exists
                      message: Email уже существует
                username_exists:
                  value:
                    error:
                      code: username_exists
                      message: Username уже существует
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/login:
    post:
      tags: [auth]
      summary: Вход
      description: Вход пользователя.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "400":
          $ref: "#/components/responses/BadRequest"
        "200":
          description: Успешный вход
          headers:
            Set-Cookie:
              description: Cookie сессии sid
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
              examples:
                success:
                  value:
                    user:
                      user_id: 123
                      username: john_doe
                      email: user@example.com
                      created_at: "2026-03-06T12:00:00Z"
                      updated_at: "2026-03-06T12:00:00Z"
                      is_trainer: false
                      is_admin: false
                      first_name: John
                      last_name: Doe
                      bio: null
                      avatar_url: null
        "401":
          description: Неверный email или пароль
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_credentials:
                  value:
                    error:
                      code: invalid_credentials
                      message: Неверный email или пароль
        "422":
          $ref: "#/components/responses/ValidationError"

  /auth/me:
    get:
      tags: [auth]
      summary: Текущий пользователь
      description: Текущий пользователь.
      security:
        - cookieAuth: []
      responses:
        "400":
          $ref: "#/components/responses/BadRequest"
        "200":
          description: Текущий пользователь
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
              examples:
                success:
                  value:
                    user:
                      user_id: 123
                      username: john_doe
                      email: user@example.com
                      created_at: "2026-03-06T12:00:00Z"
                      updated_at: "2026-03-06T12:00:00Z"
                      is_trainer: false
                      is_admin: false
                      first_name: John
                      last_name: Doe
                      bio: null
                      avatar_url: null
        "401":
          description: Не авторизован
          content:
            application/json:
              schema:
