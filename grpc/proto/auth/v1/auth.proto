syntax = "proto3";

package sporttech.auth.v1;

option go_package = "github.com/go-park-mail-ru/2026_1_SPORT.tech/grpc/gen/go/auth/v1;authv1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service AuthService {
  rpc Register(RegisterRequest) returns (AuthSessionResponse) {
    option (google.api.http) = {
      post: "/v1/auth/register"
      body: "*"
    };
  }

  rpc Login(LoginRequest) returns (AuthSessionResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
  }

  rpc Logout(LogoutRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/auth/logout"
      body: "*"
    };
  }

  rpc GetSession(GetSessionRequest) returns (GetSessionResponse) {
    option (google.api.http) = {
      post: "/v1/auth/sessions:resolve"
      body: "*"
    };
  }
}

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_CLIENT = 1;
  USER_ROLE_TRAINER = 2;
  USER_ROLE_ADMIN = 3;
}

enum AccountStatus {
  ACCOUNT_STATUS_UNSPECIFIED = 0;
  ACCOUNT_STATUS_ACTIVE = 1;
  ACCOUNT_STATUS_DISABLED = 2;
}

message AuthUser {
  int64 user_id = 1;
  string email = 2;
  string username = 3;
  UserRole role = 4;
  AccountStatus status = 5;
}

message SessionInfo {
  string session_token = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message RegisterRequest {
  string email = 1;
  string username = 2;
  string password = 3;
  UserRole role = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LogoutRequest {
  string session_token = 1;
}

message GetSessionRequest {
  string session_token = 1;
}

message AuthSessionResponse {
  AuthUser user = 1;
  SessionInfo session = 2;
}

message GetSessionResponse {
  AuthUser user = 1;
  SessionInfo session = 2;
}
