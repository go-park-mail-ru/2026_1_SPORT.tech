syntax = "proto3";

package sporttech.gateway.v1;

option go_package = "github.com/go-park-mail-ru/2026_1_SPORT.tech/grpc/gen/go/gateway/v1;gatewayv1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message ValidationErrorField {
  string field = 1;
  string message = 2;
}

message Error {
  string code = 1;
  string message = 2;
  repeated ValidationErrorField fields = 3;
}

message ErrorResponse {
  Error error = 1;
}

message User {
  int32 user_id = 1;
  string username = 2;
  string email = 3;
  google.protobuf.Timestamp created_at = 4;
  google.protobuf.Timestamp updated_at = 5;
  bool is_trainer = 6;
  bool is_admin = 7;
  string first_name = 8;
  string last_name = 9;
  optional string bio = 10;
  optional string avatar_url = 11;
}

message TrainerSport {
  int32 sport_type_id = 1;
  int32 experience_years = 2;
  optional string sports_rank = 3;
}

message TrainerDetails {
  optional string education_degree = 1;
  optional string career_since_date = 2;
  repeated TrainerSport sports = 3;
}

message ClientRegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  string password_repeat = 4;
  string first_name = 5;
  string last_name = 6;
}

message TrainerRegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
  string password_repeat = 4;
  string first_name = 5;
  string last_name = 6;
  TrainerDetails trainer_details = 7;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message AuthResponse {
  User user = 1;
}

message GetProfileRequest {
  int32 user_id = 1;
}

message ProfileResponse {
  int32 user_id = 1;
  bool is_me = 2;
  bool is_trainer = 3;
  string username = 4;
  string first_name = 5;
  string last_name = 6;
  optional string bio = 7;
  optional string avatar_url = 8;
  optional TrainerDetails trainer_details = 9;
}

message TrainerListItem {
  int32 user_id = 1;
  bool is_trainer = 2;
  string username = 3;
  string first_name = 4;
  string last_name = 5;
  optional string bio = 6;
  optional string avatar_url = 7;
  optional TrainerDetails trainer_details = 8;
}

message GetTrainersResponse {
  repeated TrainerListItem trainers = 1;
}

message UpdateMyProfileRequest {
  optional string username = 1;
  optional string first_name = 2;
  optional string last_name = 3;
  optional string bio = 4;
  optional TrainerDetails trainer_details = 5;
}

message UploadMyAvatarRequest {
  bytes avatar = 1;
  string file_name = 2;
  string content_type = 3;
}

message AvatarUploadResponse {
  string avatar_url = 1;
}

message SportType {
  int32 sport_type_id = 1;
  string name = 2;
}

message SportTypesResponse {
  repeated SportType sport_types = 1;
}

message CreatePostAttachmentRequest {
  string kind = 1;
  string file_url = 2;
}

message CreatePostRequest {
  optional int32 min_tier_id = 1;
  string title = 2;
  string text_content = 3;
  repeated CreatePostAttachmentRequest attachments = 4;
}

message UpdatePostRequest {
  int32 post_id = 1;
  optional int32 min_tier_id = 2;
  optional string title = 3;
  optional string text_content = 4;
  repeated CreatePostAttachmentRequest attachments = 5;
}

message PostAttachment {
  int32 post_attachment_id = 1;
  string kind = 2;
  string file_url = 3;
}

message PostListItem {
  int32 post_id = 1;
  int32 trainer_id = 2;
  optional int32 min_tier_id = 3;
  string title = 4;
  google.protobuf.Timestamp created_at = 5;
  bool can_view = 6;
  int32 likes_count = 7;
  bool is_liked = 8;
}

message ProfilePostsResponse {
  int32 user_id = 1;
  repeated PostListItem posts = 2;
}

message PostResponse {
  int32 post_id = 1;
  int32 trainer_id = 2;
  optional int32 min_tier_id = 3;
  string title = 4;
  string text_content = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  int32 likes_count = 8;
  bool is_liked = 9;
  repeated PostAttachment attachments = 10;
}

message GetPostRequest {
  int32 post_id = 1;
}

message DeletePostRequest {
  int32 post_id = 1;
}

message PostLikeRequest {
  int32 post_id = 1;
}

message PostLikeResponse {
  int32 post_id = 1;
  int32 likes_count = 2;
  bool is_liked = 3;
}

message DonateToProfileRequest {
  int32 user_id = 1;
  int32 amount_value = 2;
  string currency = 3;
  optional string message = 4;
}

message DonationResponse {
  int32 donation_id = 1;
  int32 sender_user_id = 2;
  int32 recipient_user_id = 3;
  int32 amount_value = 4;
  string currency = 5;
  optional string message = 6;
  google.protobuf.Timestamp created_at = 7;
}

service AuthService {
  rpc RegisterClient(ClientRegisterRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/auth/register/client"
      body: "*"
    };
  }

  rpc RegisterTrainer(TrainerRegisterRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/auth/register/trainer"
      body: "*"
    };
  }

  rpc Login(LoginRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
  }

  rpc GetMe(google.protobuf.Empty) returns (AuthResponse) {
    option (google.api.http).get = "/v1/auth/me";
  }

  rpc Logout(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (google.api.http).post = "/v1/auth/logout";
  }
}

service ProfileService {
  rpc GetProfile(GetProfileRequest) returns (ProfileResponse) {
    option (google.api.http).get = "/v1/profiles/{user_id}";
  }

  rpc ListTrainers(google.protobuf.Empty) returns (GetTrainersResponse) {
    option (google.api.http).get = "/v1/trainers";
  }

  rpc UpdateMyProfile(UpdateMyProfileRequest) returns (ProfileResponse) {
    option (google.api.http) = {
      patch: "/v1/profiles/me"
      body: "*"
    };
  }

  rpc UploadMyAvatar(UploadMyAvatarRequest) returns (AvatarUploadResponse) {
    option (google.api.http) = {
      post: "/v1/profiles/me/avatar"
      body: "*"
    };
  }

  rpc DeleteMyAvatar(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (google.api.http).delete = "/v1/profiles/me/avatar";
  }

  rpc ListProfilePosts(GetProfileRequest) returns (ProfilePostsResponse) {
    option (google.api.http).get = "/v1/profiles/{user_id}/posts";
  }
}

service PostService {
  rpc CreatePost(CreatePostRequest) returns (PostResponse) {
    option (google.api.http) = {
      post: "/v1/posts"
      body: "*"
    };
  }

  rpc GetPost(GetPostRequest) returns (PostResponse) {
    option (google.api.http).get = "/v1/posts/{post_id}";
  }

  rpc UpdatePost(UpdatePostRequest) returns (PostResponse) {
    option (google.api.http) = {
      patch: "/v1/posts/{post_id}"
      body: "*"
    };
  }

  rpc DeletePost(DeletePostRequest) returns (google.protobuf.Empty) {
    option (google.api.http).delete = "/v1/posts/{post_id}";
  }

  rpc LikePost(PostLikeRequest) returns (PostLikeResponse) {
    option (google.api.http).post = "/v1/posts/{post_id}/likes";
  }

  rpc UnlikePost(PostLikeRequest) returns (PostLikeResponse) {
    option (google.api.http).delete = "/v1/posts/{post_id}/likes";
  }
}

service SportService {
  rpc ListSportTypes(google.protobuf.Empty) returns (SportTypesResponse) {
    option (google.api.http).get = "/v1/sport-types";
  }
}

service DonationService {
  rpc DonateToProfile(DonateToProfileRequest) returns (DonationResponse) {
    option (google.api.http) = {
      post: "/v1/profiles/{user_id}/donations"
      body: "*"
    };
  }
}
