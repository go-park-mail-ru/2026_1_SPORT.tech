syntax = "proto3";

package sporttech.gateway.v1;

option go_package = "github.com/go-park-mail-ru/2026_1_SPORT.tech/grpc/gen/go/gateway/v1;gatewayv1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_CLIENT = 1;
  USER_ROLE_TRAINER = 2;
  USER_ROLE_ADMIN = 3;
}

enum AccountStatus {
  ACCOUNT_STATUS_UNSPECIFIED = 0;
  ACCOUNT_STATUS_ACTIVE = 1;
  ACCOUNT_STATUS_DISABLED = 2;
}

enum ContentBlockKind {
  CONTENT_BLOCK_KIND_UNSPECIFIED = 0;
  CONTENT_BLOCK_KIND_TEXT = 1;
  CONTENT_BLOCK_KIND_IMAGE = 2;
  CONTENT_BLOCK_KIND_VIDEO = 3;
  CONTENT_BLOCK_KIND_DOCUMENT = 4;
}

message AuthUser {
  int64 user_id = 1;
  string email = 2;
  string username = 3;
  UserRole role = 4;
  AccountStatus status = 5;
}

message SessionInfo {
  string session_token = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message AuthSessionResponse {
  AuthUser user = 1;
  SessionInfo session = 2;
}

message RegisterRequest {
  string email = 1;
  string username = 2;
  string password = 3;
  UserRole role = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LogoutRequest {
  string session_token = 1;
}

message ResolveSessionRequest {
  string session_token = 1;
}

message ResolveSessionResponse {
  AuthUser user = 1;
  SessionInfo session = 2;
}

message TrainerSport {
  int64 sport_type_id = 1;
  int32 experience_years = 2;
  optional string sports_rank = 3;
}

message TrainerDetails {
  optional string education_degree = 1;
  optional google.protobuf.Timestamp career_since_date = 2;
  repeated TrainerSport sports = 3;
}

message Profile {
  int64 user_id = 1;
  string username = 2;
  string first_name = 3;
  string last_name = 4;
  optional string bio = 5;
  optional string avatar_url = 6;
  bool is_trainer = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
  optional TrainerDetails trainer_details = 10;
}

message AuthorSummary {
  int64 user_id = 1;
  string username = 2;
  string first_name = 3;
  string last_name = 4;
  optional string bio = 5;
  optional string avatar_url = 6;
  optional TrainerDetails trainer_details = 7;
}

message SportType {
  int64 sport_type_id = 1;
  string name = 2;
}

message ProfileResponse {
  Profile profile = 1;
}

message CreateProfileRequest {
  int64 user_id = 1;
  string username = 2;
  string first_name = 3;
  string last_name = 4;
  optional string bio = 5;
  bool is_trainer = 6;
  optional TrainerDetails trainer_details = 7;
}

message GetProfileRequest {
  int64 user_id = 1;
}

message UpdateProfileRequest {
  int64 user_id = 1;
  optional string username = 2;
  optional string first_name = 3;
  optional string last_name = 4;
  optional string bio = 5;
  optional TrainerDetails trainer_details = 6;
}

message SearchAuthorsRequest {
  string query = 1;
  repeated int64 sport_type_ids = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message SearchAuthorsResponse {
  repeated AuthorSummary authors = 1;
}

message UploadAvatarRequest {
  int64 user_id = 1;
  string file_name = 2;
  string content_type = 3;
  bytes content = 4;
}

message DeleteAvatarRequest {
  int64 user_id = 1;
}

message ListSportTypesResponse {
  repeated SportType sport_types = 1;
}

message PostBlockInput {
  ContentBlockKind kind = 1;
  optional string text_content = 2;
  optional string file_url = 3;
}

message PostBlock {
  int64 post_block_id = 1;
  int32 position = 2;
  ContentBlockKind kind = 3;
  optional string text_content = 4;
  optional string file_url = 5;
}

message Post {
  int64 post_id = 1;
  int64 author_user_id = 2;
  string title = 3;
  optional int32 required_subscription_level = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  bool can_view = 7;
  int64 likes_count = 8;
  bool is_liked = 9;
  int64 comments_count = 10;
  repeated PostBlock blocks = 11;
}

message PostSummary {
  int64 post_id = 1;
  int64 author_user_id = 2;
  string title = 3;
  optional int32 required_subscription_level = 4;
  google.protobuf.Timestamp created_at = 5;
  bool can_view = 6;
  int64 likes_count = 7;
  bool is_liked = 8;
  int64 comments_count = 9;
}

message Comment {
  int64 comment_id = 1;
  int64 post_id = 2;
  int64 author_user_id = 3;
  string body = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message PostResponse {
  Post post = 1;
}

message ListAuthorPostsRequest {
  int64 author_user_id = 1;
  int64 viewer_user_id = 2;
  optional int32 viewer_subscription_level = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message ListAuthorPostsResponse {
  repeated PostSummary posts = 1;
}

message CreatePostRequest {
  int64 author_user_id = 1;
  string title = 2;
  optional int32 required_subscription_level = 3;
  repeated PostBlockInput blocks = 4;
}

message GetPostRequest {
  int64 post_id = 1;
  int64 viewer_user_id = 2;
  optional int32 viewer_subscription_level = 3;
}

message UpdatePostRequest {
  int64 post_id = 1;
  int64 author_user_id = 2;
  optional string title = 3;
  optional int32 required_subscription_level = 4;
  bool clear_required_subscription_level = 5;
  repeated PostBlockInput blocks = 6;
  bool replace_blocks = 7;
}

message DeletePostRequest {
  int64 post_id = 1;
  int64 author_user_id = 2;
}

message LikePostRequest {
  int64 post_id = 1;
  int64 user_id = 2;
  optional int32 viewer_subscription_level = 3;
}

message UnlikePostRequest {
  int64 post_id = 1;
  int64 user_id = 2;
  optional int32 viewer_subscription_level = 3;
}

message PostLikeState {
  int64 post_id = 1;
  int64 likes_count = 2;
  bool is_liked = 3;
}

message PostLikeStateResponse {
  PostLikeState state = 1;
}

message CreateCommentRequest {
  int64 post_id = 1;
  int64 author_user_id = 2;
  optional int32 viewer_subscription_level = 3;
  string body = 4;
}

message CommentResponse {
  Comment comment = 1;
}

message ListCommentsRequest {
  int64 post_id = 1;
  int64 viewer_user_id = 2;
  optional int32 viewer_subscription_level = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message ListCommentsResponse {
  repeated Comment comments = 1;
}

service AuthService {
  rpc Register(RegisterRequest) returns (AuthSessionResponse) {
    option (google.api.http) = {
      post: "/v1/auth/register"
      body: "*"
    };
  }

  rpc Login(LoginRequest) returns (AuthSessionResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
  }

  rpc Logout(LogoutRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/auth/logout"
      body: "*"
    };
  }

  rpc ResolveSession(ResolveSessionRequest) returns (ResolveSessionResponse) {
    option (google.api.http) = {
      post: "/v1/auth/sessions:resolve"
      body: "*"
    };
  }
}

service ProfileService {
  rpc CreateProfile(CreateProfileRequest) returns (ProfileResponse) {
    option (google.api.http) = {
      post: "/v1/profiles"
      body: "*"
    };
  }

  rpc GetProfile(GetProfileRequest) returns (ProfileResponse) {
    option (google.api.http).get = "/v1/profiles/{user_id}";
  }

  rpc UpdateProfile(UpdateProfileRequest) returns (ProfileResponse) {
    option (google.api.http) = {
      patch: "/v1/profiles/{user_id}"
      body: "*"
    };
  }

  rpc SearchAuthors(SearchAuthorsRequest) returns (SearchAuthorsResponse) {
    option (google.api.http) = {
      post: "/v1/authors:search"
      body: "*"
    };
  }

  rpc UploadAvatar(UploadAvatarRequest) returns (ProfileResponse) {
    option (google.api.http) = {
      post: "/v1/profiles/{user_id}/avatar"
      body: "*"
    };
  }

  rpc DeleteAvatar(DeleteAvatarRequest) returns (google.protobuf.Empty) {
    option (google.api.http).delete = "/v1/profiles/{user_id}/avatar";
  }

  rpc ListSportTypes(google.protobuf.Empty) returns (ListSportTypesResponse) {
    option (google.api.http).get = "/v1/sport-types";
  }
}

service ContentService {
  rpc ListAuthorPosts(ListAuthorPostsRequest) returns (ListAuthorPostsResponse) {
    option (google.api.http).get = "/v1/authors/{author_user_id}/posts";
  }

  rpc CreatePost(CreatePostRequest) returns (PostResponse) {
    option (google.api.http) = {
      post: "/v1/posts"
      body: "*"
    };
  }

  rpc GetPost(GetPostRequest) returns (PostResponse) {
    option (google.api.http).get = "/v1/posts/{post_id}";
  }

  rpc UpdatePost(UpdatePostRequest) returns (PostResponse) {
    option (google.api.http) = {
      patch: "/v1/posts/{post_id}"
      body: "*"
    };
  }

  rpc DeletePost(DeletePostRequest) returns (google.protobuf.Empty) {
    option (google.api.http).delete = "/v1/posts/{post_id}";
  }

  rpc LikePost(LikePostRequest) returns (PostLikeStateResponse) {
    option (google.api.http) = {
      post: "/v1/posts/{post_id}/likes"
      body: "*"
    };
  }

  rpc UnlikePost(UnlikePostRequest) returns (PostLikeStateResponse) {
    option (google.api.http).delete = "/v1/posts/{post_id}/likes/{user_id}";
  }

  rpc CreateComment(CreateCommentRequest) returns (CommentResponse) {
    option (google.api.http) = {
      post: "/v1/posts/{post_id}/comments"
      body: "*"
    };
  }

  rpc ListComments(ListCommentsRequest) returns (ListCommentsResponse) {
    option (google.api.http).get = "/v1/posts/{post_id}/comments";
  }
}
