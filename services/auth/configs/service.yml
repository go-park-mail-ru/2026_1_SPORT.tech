service_name: auth-service

server:
  host: 0.0.0.0
  grpc_port: "9091"
  http_port: "8081"
  shutdown_timeout: 10s

postgres:
  host: localhost
  port: "5432"
  db_name: sporttech_auth
  application_name: auth-service
  db_max_open_conns: 12
  db_max_idle_conns: 6
  db_conn_max_lifetime: 30m
  db_connect_timeout_seconds: 5
  db_statement_timeout: 5s
  db_lock_timeout: 1s
  db_idle_in_transaction_session_timeout: 10s

auth:
  session_ttl: 720h
  bcrypt_cost: 12

openapi:
  file_path: grpc/gen/openapiv2/auth/v1/auth.swagger.json
