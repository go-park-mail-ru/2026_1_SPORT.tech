services:
  db:
    image: postgres:17
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./docker/postgres/conf/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgres/conf/conf.d:/etc/postgresql/conf.d:ro
      - postgres_logs:/var/log/postgresql
    networks:
      - backend

  minio:
    image: quay.io/minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    command: server /data --address ":8000" --console-address ":8001"
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - minio_data:/data
    networks:
      - backend

  auth-migrator:
    image: 2026_1_sporttech-auth-service
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DBNAME: sporttech_auth
      SSL_MODE: "false"
    entrypoint: ["/bin/sh", "/opt/microservice/migrations.sh"]
    networks:
      - backend

  profile-migrator:
    image: 2026_1_sporttech-profile-service
    build:
      context: .
      dockerfile: services/profile/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DBNAME: sporttech_profile
      SSL_MODE: "false"
    entrypoint: ["/bin/sh", "/opt/microservice/migrations.sh"]
    networks:
      - backend

  content-migrator:
    image: 2026_1_sporttech-content-service
    build:
      context: .
      dockerfile: services/content/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DBNAME: sporttech_content
      SSL_MODE: "false"
    entrypoint: ["/bin/sh", "/opt/microservice/migrations.sh"]
    networks:
      - backend

  auth-db-security:
    image: postgres:17
    depends_on:
      auth-migrator:
        condition: service_completed_successfully
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: postgres
      PGUSER: ${DB_USER:?DB_USER is required}
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      AUTH_DB_APP_USER: ${AUTH_DB_APP_USER:?AUTH_DB_APP_USER is required}
      AUTH_DB_APP_PASSWORD: ${AUTH_DB_APP_PASSWORD:?AUTH_DB_APP_PASSWORD is required}
    volumes:
      - ./services/auth/migrations/security:/opt/microservice/migrations/security:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        psql -v ON_ERROR_STOP=1 \
          -v auth_app_user="$${AUTH_DB_APP_USER}" \
          -v auth_app_password="$${AUTH_DB_APP_PASSWORD}" \
          -f /opt/microservice/migrations/security/001-service-account-and-grants.sql
    networks:
      - backend

  profile-db-security:
    image: postgres:17
    depends_on:
      profile-migrator:
        condition: service_completed_successfully
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: postgres
      PGUSER: ${DB_USER:?DB_USER is required}
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      PROFILE_DB_APP_USER: ${PROFILE_DB_APP_USER:?PROFILE_DB_APP_USER is required}
      PROFILE_DB_APP_PASSWORD: ${PROFILE_DB_APP_PASSWORD:?PROFILE_DB_APP_PASSWORD is required}
    volumes:
      - ./services/profile/migrations/security:/opt/microservice/migrations/security:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        psql -v ON_ERROR_STOP=1 \
          -v profile_app_user="$${PROFILE_DB_APP_USER}" \
          -v profile_app_password="$${PROFILE_DB_APP_PASSWORD}" \
          -f /opt/microservice/migrations/security/001-service-account-and-grants.sql
    networks:
      - backend

  content-db-security:
    image: postgres:17
    depends_on:
      content-migrator:
        condition: service_completed_successfully
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: postgres
      PGUSER: ${DB_USER:?DB_USER is required}
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      CONTENT_DB_APP_USER: ${CONTENT_DB_APP_USER:?CONTENT_DB_APP_USER is required}
      CONTENT_DB_APP_PASSWORD: ${CONTENT_DB_APP_PASSWORD:?CONTENT_DB_APP_PASSWORD is required}
    volumes:
      - ./services/content/migrations/security:/opt/microservice/migrations/security:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        psql -v ON_ERROR_STOP=1 \
          -v content_app_user="$${CONTENT_DB_APP_USER}" \
          -v content_app_password="$${CONTENT_DB_APP_PASSWORD}" \
          -f /opt/microservice/migrations/security/001-service-account-and-grants.sql
    networks:
      - backend

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    environment:
      DATA_SOURCE_URI: db:5432/postgres?sslmode=disable
      DATA_SOURCE_USER: ${DB_USER:?DB_USER is required}
      DATA_SOURCE_PASS: ${DB_PASSWORD:?DB_PASSWORD is required}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  auth-service:
    image: 2026_1_sporttech-auth-service
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      AUTH_DB_USER: ${AUTH_DB_APP_USER:?AUTH_DB_APP_USER is required}
      AUTH_DB_PASSWORD: ${AUTH_DB_APP_PASSWORD:?AUTH_DB_APP_PASSWORD is required}
      AUTH_DB_HOST: db
      AUTH_DB_NAME: sporttech_auth
    depends_on:
      auth-db-security:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    restart: unless-stopped
    networks:
      - backend

  profile-service:
    image: 2026_1_sporttech-profile-service
    build:
      context: .
      dockerfile: services/profile/Dockerfile
    environment:
      PROFILE_DB_USER: ${PROFILE_DB_APP_USER:?PROFILE_DB_APP_USER is required}
      PROFILE_DB_PASSWORD: ${PROFILE_DB_APP_PASSWORD:?PROFILE_DB_APP_PASSWORD is required}
      PROFILE_DB_HOST: db
      PROFILE_DB_NAME: sporttech_profile
      PROFILE_STORAGE_HOST: minio
      PROFILE_STORAGE_PORT: "8000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      PROFILE_STORAGE_PUBLIC_BASE_URL: ${PROFILE_STORAGE_PUBLIC_BASE_URL:-http://localhost:8000/avatars}
    depends_on:
      profile-db-security:
        condition: service_completed_successfully
      minio:
        condition: service_started
    ports:
      - "8082:8082"
    restart: unless-stopped
    networks:
      - backend

  content-service:
    image: 2026_1_sporttech-content-service
    build:
      context: .
      dockerfile: services/content/Dockerfile
    environment:
      CONTENT_DB_USER: ${CONTENT_DB_APP_USER:?CONTENT_DB_APP_USER is required}
      CONTENT_DB_PASSWORD: ${CONTENT_DB_APP_PASSWORD:?CONTENT_DB_APP_PASSWORD is required}
      CONTENT_DB_HOST: db
      CONTENT_DB_NAME: sporttech_content
      CONTENT_STORAGE_HOST: minio
      CONTENT_STORAGE_PORT: "8000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      CONTENT_STORAGE_PUBLIC_BASE_URL: ${CONTENT_STORAGE_PUBLIC_BASE_URL:-http://localhost:8000/post-media}
    depends_on:
      content-db-security:
        condition: service_completed_successfully
      minio:
        condition: service_started
    ports:
      - "8083:8083"
    restart: unless-stopped
    networks:
      - backend

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      API_GATEWAY_AUTH_GRPC_ENDPOINT: auth-service:9091
      API_GATEWAY_PROFILE_GRPC_ENDPOINT: profile-service:9092
      API_GATEWAY_CONTENT_GRPC_ENDPOINT: content-service:9093
    depends_on:
      auth-service:
        condition: service_started
      profile-service:
        condition: service_started
      content-service:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - backend

  prometheus:
    image: prom/prometheus:v3.5.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      auth-service:
        condition: service_started
      profile-service:
        condition: service_started
      content-service:
        condition: service_started
      api-gateway:
        condition: service_started
      node-exporter:
        condition: service_started
      cadvisor:
        condition: service_started
      postgres-exporter:
        condition: service_started
    ports:
      - "8090:9090"
    restart: unless-stopped
    networks:
      - backend

  grafana:
    image: grafana/grafana:12.2.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "8100:3000"
    restart: unless-stopped
    networks:
      - backend

  node-exporter:
    image: prom/node-exporter:v1.9.1
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped
    networks:
      - backend

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1
    command:
      - --docker=unix:///var/run/docker.sock
      - --docker_only=true
      - --store_container_labels=true
    cgroup: host
    pid: host
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    devices:
      - /dev/kmsg:/dev/kmsg
    privileged: true
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:

volumes:
  postgres_data:
  postgres_logs:
  minio_data:
  prometheus_data:
  grafana_data:
