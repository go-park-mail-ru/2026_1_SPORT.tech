services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend

  minio:
    image: quay.io/minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --address ":8000" --console-address ":8001"
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - minio_data:/data
    networks:
      - backend

  auth-migrator:
    image: migrate/migrate:4
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/auth/migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://postgres:${DB_PASSWORD:-postgres}@db:5432/sporttech_auth?sslmode=disable",
        "up"
      ]
    networks:
      - backend

  profile-migrator:
    image: migrate/migrate:4
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/profile/migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://postgres:${DB_PASSWORD:-postgres}@db:5432/sporttech_profile?sslmode=disable",
        "up"
      ]
    networks:
      - backend

  content-migrator:
    image: migrate/migrate:4
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./services/content/migrations:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://postgres:${DB_PASSWORD:-postgres}@db:5432/sporttech_content?sslmode=disable",
        "up"
      ]
    networks:
      - backend

  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      AUTH_DB_HOST: db
      AUTH_DB_NAME: sporttech_auth
    depends_on:
      auth-migrator:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    restart: unless-stopped
    networks:
      - backend

  profile-service:
    build:
      context: .
      dockerfile: services/profile/Dockerfile
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      PROFILE_DB_HOST: db
      PROFILE_DB_NAME: sporttech_profile
      PROFILE_STORAGE_HOST: minio
      PROFILE_STORAGE_PORT: "8000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      PROFILE_STORAGE_PUBLIC_BASE_URL: ${PROFILE_STORAGE_PUBLIC_BASE_URL:-http://localhost:8000/avatars}
    depends_on:
      profile-migrator:
        condition: service_completed_successfully
      minio:
        condition: service_started
    ports:
      - "8082:8082"
    restart: unless-stopped
    networks:
      - backend

  content-service:
    build:
      context: .
      dockerfile: services/content/Dockerfile
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      CONTENT_DB_HOST: db
      CONTENT_DB_NAME: sporttech_content
    depends_on:
      content-migrator:
        condition: service_completed_successfully
    ports:
      - "8083:8083"
    restart: unless-stopped
    networks:
      - backend

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      API_GATEWAY_AUTH_GRPC_ENDPOINT: auth-service:9091
      API_GATEWAY_PROFILE_GRPC_ENDPOINT: profile-service:9092
      API_GATEWAY_CONTENT_GRPC_ENDPOINT: content-service:9093
    depends_on:
      auth-service:
        condition: service_started
      profile-service:
        condition: service_started
      content-service:
        condition: service_started
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:

volumes:
  postgres_data:
  minio_data:
